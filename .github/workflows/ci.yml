name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[telethon,aiogram,dev]"
      - name: Tests (includes packaging leak guard)
        run: pytest

  packaging-guard:
    # Garde-fou dédié : build + scan des artefacts, indépendant du matrix.
    # Échoue si un fichier interne (.planning/.claude/CLAUDE.md/.db/...) fuite.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build dist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Assert no internal files leaked
        run: |
          python - <<'PY'
          import sys, tarfile, zipfile
          from pathlib import Path

          FORBIDDEN_SEG = {".planning", ".claude", "CLAUDE.md", ".coverage", ".git", ".pytest_cache"}
          FORBIDDEN_SUF = (".db", ".db-wal", ".db-shm", ".pyc")

          def forbidden(name: str) -> bool:
              parts = Path(name).parts
              if any(s in parts for s in FORBIDDEN_SEG):
                  return True
              return name.endswith(FORBIDDEN_SUF)

          members = []
          for sd in Path("dist").glob("*.tar.gz"):
              with tarfile.open(sd) as t:
                  members += t.getnames()
          for wh in Path("dist").glob("*.whl"):
              with zipfile.ZipFile(wh) as z:
                  members += z.namelist()

          leaked = sorted(m for m in members if forbidden(m))
          if leaked:
              print("LEAK: fichiers internes dans les artefacts:")
              for m in leaked:
                  print(" -", m)
              sys.exit(1)
          print(f"OK: {len(members)} entrées scannées, aucune fuite.")
          PY
